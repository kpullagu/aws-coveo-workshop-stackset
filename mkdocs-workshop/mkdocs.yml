site_name: Coveo + AWS Workshop
site_description: Hands-on workshop demonstrating Coveo direct APIs, AgentCore with Hosted MCP, and native Coveo Search Agent experiences
site_author: Coveo
site_url: https://kpullagu.github.io/aws-coveo-workshop-stackset/

repo_name: aws-coveo-workshop-stackset
repo_url: https://github.com/kpullagu/aws-coveo-workshop-stackset

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
  logo: images/coveo-logo.jpg
  favicon: images/coveo-logo.jpg

plugins:
  - search
  - mermaid2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 2

nav:
  - Home: index.md

  - Lab 1 - Coveo Direct APIs:
    - Introduction: lab1/index.md
    - Architecture: lab1/architecture.md
    - Sample Queries: lab1/queries.md

  - Lab 2 - AgentCore + Hosted MCP:
    - Introduction: lab2/index.md
    - Architecture: lab2/architecture.md

  - Lab 3 - Native Coveo Search Agent:
    - Introduction: lab3/index.md
    - Architecture: lab3/architecture.md
    - Sample Queries: lab3/queries.md
    - Instructor Guide: lab3/instructor-guide.md

  - Resources:
    - Architecture Diagrams: resources/diagrams.md
    - Code References: resources/code.md
    - Additional Reading: resources/reading.md

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/custom.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kpullagu/aws-coveo-workshop-stackset
    - icon: fontawesome/solid/globe
      link: https://www.coveo.com

copyright: Copyright &copy; 2025 Coveo
